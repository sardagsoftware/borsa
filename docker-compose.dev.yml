services:
  # Ana AILYDIAN AI LENS TRADER Uygulaması
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
    env_file:
      - .env.local
    volumes:
      # Kod değişikliklerini canlı takip için volume mount
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - ailydian-network

  # PostgreSQL Veritabanı
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ailydian_borsa
      POSTGRES_USER: ailydian
      POSTGRES_PASSWORD: ailydian2025
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - ailydian-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailydian -d ailydian_borsa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ailydian-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # Prisma Studio (Veritabanı Yönetimi)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5555:5555"
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
    command: ["pnpm", "dlx", "prisma", "studio", "--port", "5555", "--hostname", "0.0.0.0"]
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - ailydian-network

  # Adminer (Veritabanı Web Interface)
  adminer:
    image: adminer:4-standalone
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: "hydra"
    restart: unless-stopped
    networks:
      - ailydian-network

  # Redis Commander (Redis Web Interface)
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ailydian-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ailydian-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
