<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the hexagonal pattern -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#f59e0b;#eab308;#f97316;#f59e0b" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#eab308;stop-opacity:0.8">
        <animate attributeName="stop-color" 
                 values="#eab308;#f97316;#f59e0b;#eab308" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6">
        <animate attributeName="stop-color" 
                 values="#f97316;#f59e0b;#eab308;#f97316" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Inner circuit gradient -->
    <radialGradient id="circuitGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.3"/>
    </radialGradient>
  </defs>

  <!-- Outer rotating ring -->
  <g transform-origin="16 16">
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 16 16"
                      to="360 16 16"
                      dur="8s"
                      repeatCount="indefinite"/>
    
    <!-- Hexagonal blockchain pattern -->
    <path d="M16 2 L26 8 L26 18 L16 24 L6 18 L6 8 Z" 
          fill="none" 
          stroke="url(#hexGradient)" 
          stroke-width="1.5" 
          opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Inner hexagon -->
    <path d="M16 6 L22 10 L22 16 L16 20 L10 16 L10 10 Z" 
          fill="none" 
          stroke="url(#hexGradient)" 
          stroke-width="1" 
          opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Central AI neural node -->
  <circle cx="16" cy="16" r="4" fill="url(#circuitGradient)">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural network connections -->
  <g stroke="url(#circuitGradient)" stroke-width="0.5" opacity="0.6">
    <line x1="16" y1="16" x2="8" y2="8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="16" x2="24" y2="8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="16" x2="24" y2="24">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="16" x2="8" y2="24">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner nodes -->
  <circle cx="8" cy="8" r="1.5" fill="#f59e0b" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="8" r="1.5" fill="#eab308" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="24" r="1.5" fill="#f97316" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="24" r="1.5" fill="#f59e0b" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Data flow animation -->
  <g stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.5">
    <circle cx="16" cy="16" r="8">
      <animate attributeName="r" values="8;12;8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
