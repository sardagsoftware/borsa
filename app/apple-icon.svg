<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#f59e0b;#eab308;#f97316;#f59e0b" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#eab308;stop-opacity:0.8">
        <animate attributeName="stop-color" 
                 values="#eab308;#f97316;#f59e0b;#eab308" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6">
        <animate attributeName="stop-color" 
                 values="#f97316;#f59e0b;#eab308;#f97316" 
                 dur="3s" 
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <radialGradient id="circuitGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.3"/>
    </radialGradient>
    
    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="90" cy="90" r="90" fill="url(#bgGradient)"/>

  <!-- Outer rotating ring -->
  <g transform-origin="90 90">
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 90 90"
                      to="360 90 90"
                      dur="8s"
                      repeatCount="indefinite"/>
    
    <!-- Large hexagonal blockchain pattern -->
    <path d="M90 20 L140 50 L140 110 L90 140 L40 110 L40 50 Z" 
          fill="none" 
          stroke="url(#hexGradient)" 
          stroke-width="3" 
          opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Inner hexagon -->
    <path d="M90 40 L120 60 L120 100 L90 120 L60 100 L60 60 Z" 
          fill="none" 
          stroke="url(#hexGradient)" 
          stroke-width="2" 
          opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Central AI neural node -->
  <circle cx="90" cy="90" r="18" fill="url(#circuitGradient)">
    <animate attributeName="r" values="18;22;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural network connections -->
  <g stroke="url(#circuitGradient)" stroke-width="2" opacity="0.6">
    <line x1="90" y1="90" x2="45" y2="45">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="90" x2="135" y2="45">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="90" x2="135" y2="135">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="90" x2="45" y2="135">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner nodes -->
  <circle cx="45" cy="45" r="6" fill="#f59e0b" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="45" r="6" fill="#eab308" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="135" r="6" fill="#f97316" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="135" r="6" fill="#f59e0b" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Data flow animation -->
  <g stroke="#22d3ee" stroke-width="3" fill="none" opacity="0.5">
    <circle cx="90" cy="90" r="40">
      <animate attributeName="r" values="40;60;40" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Brand text at bottom -->
  <text x="90" y="160" text-anchor="middle" font-family="Orbitron" font-size="12" fill="#f59e0b" opacity="0.8">
    AiLydian Trader
  </text>
</svg>
