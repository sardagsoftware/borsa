services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - QUANTUM_ML_SERVICE_URL=http://quantum-ml:8001
      - SOCIAL_SENTIMENT_SERVICE_URL=http://social-sentiment:8002
    depends_on:
      - db
      - redis
      - quantum-ml
      - social-sentiment

  # Quantum-ML Microservice
  quantum-ml:
    build:
      context: ./services/quantum-ml
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Social Sentiment Analysis Microservice
  social-sentiment:
    build:
      context: ./services/social-sentiment
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 2G

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: borsa
      POSTGRES_USER: borsa
      POSTGRES_PASSWORD: borsa
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  db_data:
  redis_data:
