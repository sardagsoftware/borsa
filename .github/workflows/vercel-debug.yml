name: Vercel Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel Token
        run: |
          echo "Token length: ${#VERCEL_TOKEN}"
          echo "Token prefix: ${VERCEL_TOKEN:0:10}..."
          
          echo "--- Checking Vercel API ---"
          curl -s -o /tmp/response.json -w "HTTP %{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/prj_z15xHHAw4uc4h3aXWHx6KFQNJ7jS?teamId=team_Thpt1qz2YEezX9COIDbSfAOP"
          echo ""
          echo "--- Response ---"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          
          echo ""
          echo "--- Check Deployments ---"
          curl -s -o /tmp/deploys.json -w "HTTP %{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=prj_z15xHHAw4uc4h3aXWHx6KFQNJ7jS&teamId=team_Thpt1qz2YEezX9COIDbSfAOP&limit=3"
          echo ""
          echo "--- Deployments ---"
          cat /tmp/deploys.json | python3 -c "
import json, sys
data = json.load(sys.stdin)
if 'deployments' in data:
    for d in data['deployments']:
        print(f\"ID: {d.get('uid','?')} State: {d.get('state','?')} URL: {d.get('url','?')} Created: {d.get('created','?')}\")
elif 'error' in data:
    print(f\"ERROR: {data['error'].get('message','unknown')}\")
else:
    print(json.dumps(data, indent=2))
" 2>/dev/null || cat /tmp/deploys.json
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
