name: Vercel Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel Project and Unpause
        env:
          VT: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== Vercel API Check ==="
          echo "Token available: $([ -n \"$VT\" ] && echo 'YES' || echo 'NO')"
          echo "Token length: $(echo -n \"$VT\" | wc -c)"

          echo ""
          echo "--- Project Status ---"
          curl -s -w "\nHTTP: %{http_code}\n" \
            -H "Authorization: Bearer $VT" \
            "https://api.vercel.com/v9/projects/prj_z15xHHAw4uc4h3aXWHx6KFQNJ7jS?teamId=team_Thpt1qz2YEezX9COIDbSfAOP" \
            | head -50

          echo ""
          echo "--- Unpause Attempt ---"
          curl -s -w "\nHTTP: %{http_code}\n" -X PATCH \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d '{"paused":false}' \
            "https://api.vercel.com/v9/projects/prj_z15xHHAw4uc4h3aXWHx6KFQNJ7jS?teamId=team_Thpt1qz2YEezX9COIDbSfAOP" \
            | head -30

          echo ""
          echo "--- Recent Deployments ---"
          curl -s -w "\nHTTP: %{http_code}\n" \
            -H "Authorization: Bearer $VT" \
            "https://api.vercel.com/v6/deployments?projectId=prj_z15xHHAw4uc4h3aXWHx6KFQNJ7jS&teamId=team_Thpt1qz2YEezX9COIDbSfAOP&limit=2" \
            | head -50

      - uses: actions/checkout@v4

      - name: Setup and Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 || echo "DEPLOY_STEP_FAILED"

      - name: Check Site
        if: always()
        run: |
          sleep 15
          echo "www.ailydian.com HTTP: $(curl -s -o /dev/null -w '%{http_code}' https://www.ailydian.com)"
          echo "ailydian.com HTTP: $(curl -s -o /dev/null -w '%{http_code}' https://ailydian.com)"
